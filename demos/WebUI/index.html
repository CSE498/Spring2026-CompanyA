<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebInterface Demo</title>
    <style>
        :root {
          color-scheme: dark;
          --bg-0: #050812;
          --bg-1: #0b1220;
          --bg-2: #132034;
          --panel-bg: linear-gradient(180deg, rgba(16, 22, 36, 0.92), rgba(8, 12, 22, 0.9));
          --panel-border: rgba(124, 170, 255, 0.18);
          --panel-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
          --text-main: #f4f7fb;
          --text-muted: #9fb0c8;
          --accent: #6be2ff;
          --accent-strong: #7caaff;
          --slot-bg: rgba(255, 255, 255, 0.05);
        }

        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          min-height: 100vh;
          overflow: hidden;
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background:
            radial-gradient(circle at 15% 18%, rgba(107, 226, 255, 0.14), transparent 0 24%),
            radial-gradient(circle at 85% 12%, rgba(124, 170, 255, 0.16), transparent 0 28%),
            linear-gradient(145deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
          color: var(--text-main);
        }

        body::before {
          content: "";
          position: fixed;
          inset: 0;
          pointer-events: none;
          background:
            linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
          background-size: 34px 34px;
          opacity: 0.28;
        }

        #root {
          width: 100vw;
          height: 100vh;
          position: relative;
          display: grid;
          place-items: center;
          grid-template-areas: "inner-div";
          overflow: hidden;
        }

        #root::after {
          content: "";
          position: absolute;
          inset: 0;
          pointer-events: none;
          background: radial-gradient(circle at center, transparent 52%, rgba(1, 5, 12, 0.5) 100%);
        }

        #web-canvas {
          width: 100%;
          height: 100%;
          display: block;
          grid-area: inner-div;
          background:
            radial-gradient(circle at top, rgba(31, 56, 106, 0.18), transparent 0 42%),
            linear-gradient(180deg, rgba(7, 11, 20, 0.84), rgba(6, 10, 18, 0.98));
          box-shadow:
            inset 0 0 0 1px rgba(255, 255, 255, 0.06),
            inset 0 0 120px rgba(0, 0, 0, 0.28);
        }

        .modal-menu {
          display: none;
          width: min(680px, calc(100vw - 48px));
          max-height: calc(100vh - 56px);
          overflow: auto;
          border-radius: 26px;
          border: 1px solid var(--panel-border);
          background: var(--panel-bg);
          grid-area: inner-div;
          z-index: 100;
          box-shadow: var(--panel-shadow);
          backdrop-filter: blur(20px) saturate(125%);
          -webkit-backdrop-filter: blur(20px) saturate(125%);
          color: var(--text-main);
        }

        .modal-menu::-webkit-scrollbar {
          width: 10px;
        }

        .modal-menu::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.14);
          border-radius: 999px;
        }

        .modal-menu button {
          min-height: 54px;
          padding: 0 18px;
          border: 1px solid rgba(255, 255, 255, 0.09);
          border-radius: 16px;
          background:
            linear-gradient(180deg, rgba(26, 35, 54, 0.95), rgba(13, 19, 32, 0.95));
          color: var(--text-main) !important;
          font-size: 15px;
          font-weight: 700;
          letter-spacing: 0.01em;
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.06),
            0 12px 32px rgba(0, 0, 0, 0.22);
          transition:
            transform 140ms ease,
            border-color 140ms ease,
            box-shadow 140ms ease,
            background 140ms ease;
          cursor: pointer;
        }

        .modal-menu button:hover {
          transform: translateY(-1px);
          border-color: rgba(107, 226, 255, 0.45);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.08),
            0 16px 34px rgba(0, 0, 0, 0.28);
          background:
            linear-gradient(180deg, rgba(34, 45, 68, 0.98), rgba(17, 24, 38, 0.98));
        }

        .modal-menu button:disabled {
          opacity: 0.55;
          cursor: default;
          transform: none;
        }

        #main-menu,
        #pause-menu,
        #settings-menu {
          max-width: 560px;
          padding: 36px 34px;
        }

        #inventory-menu {
          width: min(820px, calc(100vw - 48px));
          padding: 30px 28px 28px;
        }

        #inventory-grid {
          width: 100%;
          display: grid !important;
          grid-template-columns: repeat(5, minmax(88px, 1fr));
          gap: 16px !important;
          justify-items: center;
          align-items: center;
          padding: 6px 4px 10px !important;
        }

        #inventory-grid img {
          width: 92px !important;
          height: 92px !important;
          padding: 10px;
          border-radius: 18px;
          border: 1px solid rgba(255, 255, 255, 0.08);
          background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
            var(--slot-bg);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.04),
            0 10px 26px rgba(0, 0, 0, 0.22);
          object-fit: contain;
          transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
          cursor: pointer;
        }

        #inventory-menu img {
          background-color: transparent;
        }

        #inventory-grid img:hover {
          transform: translateY(-2px);
          border-color: rgba(107, 226, 255, 0.42);
          background:
            linear-gradient(180deg, rgba(107, 226, 255, 0.1), rgba(255, 255, 255, 0.04)),
            var(--slot-bg);
        }

        @media (max-width: 900px) {
          .modal-menu {
            width: calc(100vw - 24px);
            max-height: calc(100vh - 24px);
            border-radius: 20px;
          }

          #main-menu,
          #pause-menu,
          #settings-menu,
          #inventory-menu {
            padding: 22px 18px;
          }

          #inventory-grid {
            grid-template-columns: repeat(4, minmax(72px, 1fr));
          }

          #inventory-grid img {
            width: 78px !important;
            height: 78px !important;
            border-radius: 14px;
          }
        }
    </style>
</head>
<body>
    <div id="root">
        <canvas id="web-canvas"></canvas>
        <div id="main-menu" class="modal-menu"></div>
        <div id="pause-menu" class="modal-menu"></div>
        <div id="settings-menu" class="modal-menu"></div>
        <div id="inventory-menu" class="modal-menu"></div>
        <div id="stats-menu" class="modal-menu"></div>
    </div>
    <script src="Group18_main.js"></script>
</body>
</html>
