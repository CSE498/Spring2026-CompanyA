<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WebCanvas Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0f1115;
            color: #e6e6e6;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            gap: 12px;
        }

        canvas {
            border: 1px solid #333;
            background: #111318;
            display: block;
        }

        .hint {
            opacity: 0.7;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>WebCanvas Demo</h2>
    <canvas id="web-canvas" width="900" height="600"></canvas>
    <div class="hint">Powered by Emscripten + Canvas2D</div>
</div>

<!-- ES6 module loader -->
<script type="module">
    import createModule from "./WebCanvasDemo.js";
    createModule().catch(err => {
        console.error("Failed to start WebCanvasDemo:", err);
    });
</script>
</body>
</html>
