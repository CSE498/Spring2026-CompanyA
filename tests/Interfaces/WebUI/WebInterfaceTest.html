<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebInterface Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }

    #root {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: grid;
      place-items: center;
      grid-template-areas: "inner-div";
    }

    #web-canvas {
      width: 100%;
      height: 100%;
      display: block;
      grid-area: inner-div;
    }

    .modal-menu {
      display: none;
      min-width: 600px;
      border-radius: 20px;
      border: 2px solid #012009;
      background-color: #023c0ccf;
      grid-area: inner-div;
      z-index: 100;
    }

    #inventory-menu img {
      background-color: #505050;
    }
  </style>
</head>

<body>
  <div id="root">
    <canvas id="web-canvas"></canvas>
    <div id="main-menu" class="modal-menu"></div>
    <div id="pause-menu" class="modal-menu"></div>
    <div id="settings-menu" class="modal-menu"></div>
    <div id="inventory-menu" class="modal-menu"></div>
    </div>
    <script src="WebInterfaceTest.js"></script>
</body>

</html>
